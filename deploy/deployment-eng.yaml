apiVersion: apps/v1
kind: Deployment
metadata:
  name: eng-bot-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eng-bot
  template:
    metadata:
      labels:
        app: eng-bot
    spec:
          containers:
      - name: bot
        image: bdistin/discord-bot-container:latest
        env:
        - name: BOT_TOKEN
          value: "$(BOT_TOKEN_ENG)"