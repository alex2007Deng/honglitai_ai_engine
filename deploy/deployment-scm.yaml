apiVersion: apps/v1
kind: Deployment
metadata:
  name: scm-bot-deployment
spec:
  replicas: 1
    selector:
    matchLabels:
      app: scm-bot
  template:
    metadata:
      labels:
        app: scm-bot
    spec:
      containers:
      - name: bot
        image: bdistin/discord-bot-container:latest
        env:
        - name: BOT_TOKEN
          value: "$(BOT_TOKEN_SCM)"
          